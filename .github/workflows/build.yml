name: Build Beacon Economy Test Jar

on:
  push:
    branches: [ "main", "master", "shockveil-test" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build
        run: mvn -B package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: BeaconEconomy-Shockveil-Test
          path: target/*.jar
