name: BeaconEconomy
version: ${project.version}
main: com.danzi.beaconeconomy.BeaconEconomyPlugin
api-version: '1.21'
author: Danzi
commands:
  relic:
    description: Forgotten Relic information.
    usage: /relic info
  shockveiltest:
    description: Gives Shockveil to an operator for testing.
    usage: /shockveiltest
    permission: beaconeconomy.admin
permissions:
  beaconeconomy.admin:
    description: Beacon Economy admin commands.
    default: op
